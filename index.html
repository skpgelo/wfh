<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Absensi & Upload Pembatasan Gambar</title>
 <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="navbar">
        <div>
            <h2>Sistem Absensi Terstruktur</h2>
            <span id="user-email-display" class="user-info">Memuat email...</span>
        </div>
        <div class="tab-menu">
            <button class="tab-btn active" onclick="switchTab('data')">📋 Form & Data</button>
            <button class="tab-btn" onclick="switchTab('peta')">🗺️ Peta Sebaran</button>
        </div>
    </div>

    <div class="content-container">
        <div id="panel-data" class="tab-panel active">
            <div class="form-container">
                <h3>Form Pengisian Kerja (Maksimal 2 Gambar)</h3>
                <form id="karyawan-form">
                    <div class="form-group">
                        <label for="input-nama">Nama Lengkap (Pilih):</label>
                        <select id="input-nama" required onchange="autoFillJabatan()">
                            <option value="">-- Pilih Nama Anda --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="input-jabatan">Jabatan ID:</label>
                        <input type="text" id="input-jabatan" readonly placeholder="Terisi otomatis..." style="background-color: #eee;">
                    </div>
                    <div class="form-group">
                        <label for="input-jobdesk">Deskripsi Pekerjaan (Jobdesk):</label>
                        <textarea id="input-jobdesk" rows="3" required placeholder="Tuliskan detail pekerjaan hari ini..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="input-images">Dokumentasi Foto/Gambar:</label>
                        <input type="file" id="input-images" accept="image/*" multiple onchange="validateFileCount(this)">
                        <span class="file-hint">* Anda dapat memilih langsung hingga 2 file gambar sekaligus.</span>
                    </div>
                    <button type="submit" class="btn-submit" id="btn-submit-data">Kirim Data & Kunci GPS</button>
                </form>
            </div>

            <hr>
            <h3>Daftar Riwayat Data</h3>
            <div id="loading">Memuat data dari database...</div>

            <div class="table-container">
                <table id="data-table" style="display: none;">
                    <thead id="table-head"></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>

        <div id="panel-peta" class="tab-panel">
            <iframe src="peta.html" id="peta-frame"></iframe>
        </div>
    </div>

    <!-- WINDOW MODAL UNTUK EDIT DATA -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h3>Edit Data Isian Kerja</h3>
            <form id="edit-form">
                <input type="hidden" id="edit-row-number">
                <div class="form-group">
                    <label for="edit-jobdesk">Deskripsi Pekerjaan (Jobdesk):</label>
                    <textarea id="edit-jobdesk" rows="3" required></textarea>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-close-modal" onclick="closeEditModal()">Batal</button>
                    <button type="submit" class="btn-submit" style="background-color: #3498db;">Simpan</button>
                </div>
            </form>
        </div>
    </div>
<script src="script.js"></script>

</body>
</html>
